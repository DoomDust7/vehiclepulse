version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - .:/app
    environment:
      - MOCK_MODE=${MOCK_MODE:-true}
      - SERIAL_PORT=${SERIAL_PORT:-/dev/ttyUSB0}
      - DB_PATH=/app/data/vehiclepulse.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    # Uncomment when using a real ELM327 adapter:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
